<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Keyboard Movement with Proper Boundary</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            height: 100vh;
            margin: 0;
            position: relative;
            background: #eee;
        }

        .box {
            width: 200px;
            height: 200px;
            background: #ff5733;
            position: absolute;
            left: 0;
            top: 0;
        }
    </style>
</head>
<body>

<div class="box"></div>

<script>
$(document).ready(function () {

    let step = 50;
    let boxWidth = 200;

    $(document).keydown(function (e) {

        let $box = $(".box");
        let currentLeft = $box.position().left;
        let maxRight = $(window).width() - boxWidth;
        let newLeft = currentLeft;

        if (e.keyCode === 40) {
            newLeft = currentLeft + step;
            if (newLeft > maxRight) {
                newLeft = maxRight;
            }
        }

        if (e.keyCode === 38) {
            newLeft = currentLeft - step;
            if (newLeft < 0) {
                newLeft = 0;
            }
        }

        $box.stop(true).animate({
            left: newLeft + "px"
        }, 200);

    });

});
</script>

</body>
</html>
