<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js" type="text/javascript"></script>
  <script></script>
</head>

<body>
  <div>

  </div>

  <script>

$(document).ready(() => {
      $("div").css({
        "height": "200px",
        "width": "200px",
        "background-color": "black",
        "position": "absolute",
        "left": "0px",
        "top": "0px"
      })
      function square(){
          $('div').animate({
               "height": "200px",
               "width": "200px",

               "borderRadius": "0%"

          },3000,circle)
      };
      function circle(){
          $('div').animate({
               "height": "200px",
               "width": "200px",

               "borderRadius": "50%"

          },3000,square)
      };
      circle();
    });

  </script>


</body>

</html>
