<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    div.flag {
      width: 900px;
      height: 600px;
      background: #d21034;
      position: relative;
    }
    div.flag > div {
      width: 900px;
      height: 300px;
      background: blue;
      position: absolute;
      top: 150px;
      left: 0;
    }
    div p {
      text-align: center;
      font-size: 100px;
      margin: 0;
      color: white;
    }
    flag>p{
      color: white;
      padding-top: 20px;
      text-align: end;
    }
    div>div>div{
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 50%;
      position: relative;
      top: 50px;
      left: 350px;

    }
    div>div>div>p{
      font-size: 80px;
      color: black;
    }
    
  </style>
</head>
