<!DOCTYPE html>
<html>

<head>
  <title>Flexbox Pricing Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet">
  <style>
  body {
    font-family: 'Sono', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #f4f4f4;
    margin: 0;
  }

  .pricing-container {
    display: flex;
    gap: 20px;
    padding: 20px;
    /* Default for larger screens: horizontal row */
    flex-direction: row;
    align-items: stretch;
  }

  .pricing-plan {
    background: white;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    flex: 1; /* Makes all cards equal width */
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  /* Specific styles to match the visual reference */
  .plan-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 10px; }
  .plan-price { font-weight: 700; font-size: 2rem; margin-bottom: 20px; }
  .plan-features { list-style: none; padding: 0; margin-bottom: 30px; }
  .plan-features li { margin: 10px 0; }
  
  .plan-button {
    background-color: #ff6600;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
  }

  /* Media Query for Smaller Screens */
  @media (max-width: 1250px) {
    .pricing-container {
      /* Switch to vertical stacking */
      flex-direction: column;
      align-items: center;
    }

    .pricing-plan {
      width: 80%; /* Makes cards wider on mobile */
      max-width: 400px;
    }
  }
</style>
</head>

<body>
  <div class="pricing-container">
    <div class="pricing-plan">
      <div class="plan-title">Basic</div>
      <div class="plan-price">$9.99/month</div>
      <ul class="plan-features">
        <li>✅ 10GB Storage</li>
        <li>✅ 1 User</li>
        <li>🚫 Support</li>
      </ul>
      <button class="plan-button">Sign Up</a>
    </div>
    <div class="pricing-plan">
      <div class="plan-title">Standard</div>
      <div class="plan-price">$19.99/month</div>
      <ul class="plan-features">
        <li>✅ 50GB Storage</li>
        <li>✅ 5 Users</li>
        <li>✅ Phone &amp; Email Support</li>
      </ul>
      <button class="plan-button">Sign Up</a>
    </div>
    <div class="pricing-plan">
      <div class="plan-title">Premium</div>
      <div class="plan-price">$49.99/month</div>
      <ul class="plan-features">
        <li>✅ 100GB Storage</li>
        <li>✅ 10 Users</li>
        <li>✅ 24/7 Support</li>
      </ul>
      <button class="plan-button">Sign Up</a>
    </div>
  </div>

</body>

</html>
